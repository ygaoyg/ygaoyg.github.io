# ===========================================================================
# Lab News — single source of truth.
# Both the News page (/news/) and the homepage "Lab News" sidebar read from
# this file. Add or edit an entry here and BOTH update automatically.
#
# Entries can be in any order; the site sorts by `date` (newest first).
#
# Fields per entry:
#   date         : YYYY-MM-DD   (used only for sorting — required)
#   date_display : how the date appears on the site (e.g. "March 2026")
#   text         : the news text (HTML links allowed, e.g. <a href='...'>...</a>)
#   photo        : OPTIONAL image in /pics/ (shown on the News page only).
#                  Omit for a text-only entry.
#   logo         : OPTIONAL true — render `photo` as a contained logo
#                  (white box, no cropping) instead of a cover photo.
# ===========================================================================

